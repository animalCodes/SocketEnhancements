orbs_of_binding:
  enabled: true
  # Whether orbs can be crafted
  craftable: true
  # How many sockets can be added above the item's socket limit.
  # 0 means orbs respect socket limit.
  bonus_sockets: 0
  # Material type of orbs of binding.
  material: CONDUIT
  # Materials used to craft an orb of binding.
  # If there are more than nine items in the list, only the first nine (valid)
  # items will be used.
  ingredients: ["BLAZE_POWDER", "PRISMARINE_SHARD", "CHORUS_FRUIT"]
  # Whether dropped orbs can be destroyed by fire/lava
  flammable: false
